<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市场陌拜跟踪系统 — 京顺医院</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#101843;--primary-light:#1a2a6b;--accent:#FF6B35;--accent-light:#fff4ef;--bg:#f5f6fa;--card:#fff;--text:#333;--text2:#666;--border:#e0e0e0;--success:#27ae60;--danger:#e74c3c;--warn:#f39c12;--radius:8px;}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
.login-page{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#101843 0%,#1a2a6b 100%);}
.login-box{background:#fff;border-radius:12px;padding:36px;width:380px;box-shadow:0 10px 40px rgba(0,0,0,.2);}
.login-box h1{text-align:center;color:var(--primary);font-size:20px;margin-bottom:2px;}
.login-box .sub{text-align:center;color:var(--text2);font-size:12px;margin-bottom:20px;}
.login-box .form-group{margin-bottom:14px;}
.login-box label{display:block;font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text);}
.login-box input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;}
.login-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(16,24,67,.1);}
.login-box .btn{width:100%;padding:9px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;}
.login-box .btn:hover{background:var(--primary-light);}
.login-error{color:var(--danger);font-size:12px;text-align:center;margin-top:6px;display:none;}
.login-box .role-hint{text-align:center;font-size:11px;color:var(--text2);margin-top:8px;}

/* APP LAYOUT */
.app{display:none;min-height:100vh;}
.app.show{display:flex;}
.sidebar{width:230px;background:var(--primary);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;overflow:hidden;}
.sidebar .logo{padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:6px;}
.sidebar .logo h1{font-size:15px;letter-spacing:1px;font-weight:700;flex:1;}
.sidebar .logo .badge-role{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;}
.badge-admin{background:var(--accent);color:#fff;}
.badge-sales{background:#4fc3f7;color:#101843;}
.sidebar .nav-section{padding:8px 0 2px 16px;font-size:9.5px;opacity:.5;letter-spacing:1px;text-transform:uppercase;}
.sidebar nav{flex:1;overflow-y:auto;}
.sidebar nav a{display:flex;align-items:center;gap:7px;padding:8px 16px;color:rgba(255,255,255,.7);text-decoration:none;font-size:12px;transition:.15s;cursor:pointer;border-left:3px solid transparent;}
.sidebar nav a:hover,.sidebar nav a.active{background:rgba(255,255,255,.08);color:#fff;}
.sidebar nav a.active{border-left-color:var(--accent);}
.sidebar nav a.admin-link{color:rgba(255,183,77,.8);}
.sidebar .user-info{padding:8px 16px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.sidebar .user-info .logout-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;}
.main{margin-left:230px;flex:1;padding:18px 24px;}

/* COMMON */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.page-header h2{font-size:17px;color:var(--primary);font-weight:700;}
.page-header .sub{font-size:11px;color:var(--text2);}
.page-header .actions{display:flex;gap:6px;}

.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);background:#fafbfc;}
.card-header h3{font-size:13px;color:var(--primary);font-weight:600;}
.card-header .badge{font-size:10px;padding:1px 7px;border-radius:8px;background:var(--accent-light);color:var(--accent);font-weight:600;}
.card-body{padding:10px 14px;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:14px;}
.stat-card{background:var(--card);border-radius:var(--radius);padding:10px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--border);}
.stat-card .label{font-size:10px;color:var(--text2);margin-bottom:1px;}
.stat-card .value{font-size:20px;font-weight:700;color:var(--primary);}
.stat-card .sub{font-size:10px;color:var(--text2);margin-top:1px;}
.stat-card.highlight{border-left:3px solid var(--accent);background:var(--accent-light);}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
th{text-align:left;padding:6px 8px;background:#f8f9fc;color:var(--text2);font-weight:600;font-size:10.5px;border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:#fafbfc;}
.tag{display:inline-block;padding:1px 6px;border-radius:7px;font-size:9.5px;font-weight:600;}
.tag-blue{background:#e8eaf6;color:var(--primary);}
.tag-orange{background:var(--accent-light);color:var(--accent);}
.tag-green{background:#e8f5e9;color:var(--success);}
.tag-gray{background:#f0f0f0;color:var(--text2);}
.tag-cyan{background:#e0f7fa;color:#00838f;}
.tag-red{background:#fde8e8;color:var(--danger);}

.btn{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-light);}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover{opacity:.9;}
.btn-outline{background:transparent;color:var(--primary);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--primary);}
.btn-sm{padding:2px 6px;font-size:10px;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-success{background:var(--success);color:#fff;}
.btn-ghost{background:transparent;color:var(--text2);border:1px dashed var(--border);font-size:10px;padding:3px 8px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:2000;justify-content:center;align-items:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:10px;width:560px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15);}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);}
.modal-header h3{font-size:14px;color:var(--primary);}
.modal-close{width:22px;height:22px;border:none;background:#f0f0f0;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:#666;}
.modal-body{padding:14px 18px;}
.modal-footer{padding:8px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:6px;}

/* FORM */
.form-group{margin-bottom:10px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:11.5px;font-family:inherit;background:#fff;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(16,24,67,.1);}
.form-group textarea{resize:vertical;min-height:40px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* PROGRESS */
.progress-wrap{display:flex;align-items:center;gap:5px;}
.progress-bar{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden;}
.progress-bar .fill{height:100%;border-radius:3px;background:var(--accent);transition:.3s;}
.progress-text{font-size:10px;color:var(--text2);white-space:nowrap;}

.empty-state{text-align:center;padding:20px;color:var(--text2);font-size:12px;}
.empty-state .icon{font-size:28px;margin-bottom:3px;}
.empty-state.small{padding:12px;font-size:11px;}

/* STAGE */
.stage-flow{display:flex;gap:3px;align-items:center;}
.stage-dot{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:8px;font-weight:700;border:2px solid var(--border);color:var(--text2);background:#fff;flex-shrink:0;cursor:default;}
.stage-dot.done{background:var(--success);border-color:var(--success);color:#fff;}
.stage-dot.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.stage-line{width:8px;height:2px;background:var(--border);flex-shrink:0;}
.stage-line.done{background:var(--success);}

/* PLAN ITEM */
.plan-item{padding:7px 10px;border-left:3px solid var(--accent);background:#fafbfc;border-radius:4px;margin-bottom:5px;font-size:12px;}
.plan-item .plan-title{font-weight:600;font-size:12px;color:var(--primary);}
.plan-item .plan-meta{font-size:10px;color:var(--text2);margin-top:1px;}
.plan-item.done{border-left-color:var(--success);opacity:.7;}

/* ORG */
.orggrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;}
.orgcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.orgcard-head{padding:7px 10px;font-weight:700;font-size:12px;color:#fff;}
.orgcard-body{padding:7px 10px;}
.orgcard-body .person-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #f0f0f0;font-size:11px;}
.orgcard-body .person-row:last-child{border:none;}

/* ADMIN TABS */
.admin-tabs{display:flex;gap:2px;margin-bottom:10px;flex-wrap:wrap;}
.admin-tab{padding:5px 12px;border:1px solid var(--border);background:var(--card);border-radius:4px 4px 0 0;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;}
.admin-tab.active{color:var(--primary);border-color:var(--primary);border-bottom-color:var(--primary);}
.admin-tab:hover{color:var(--primary);}

/* TOAST */
.toast{position:fixed;top:16px;right:16px;z-index:3000;background:var(--primary);color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* SALES OVERVIEW on admin */
.sales-card{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:.15s;}
.sales-card:hover{background:#fafbfc;border-color:var(--primary);}
.sales-card .avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.sales-card .info{flex:1;}
.sales-card .info .name{font-weight:600;font-size:12.5px;}
.sales-card .info .meta{font-size:10px;color:var(--text2);}
.sales-card .status{font-size:10px;padding:2px 6px;border-radius:4px;}

@media(max-width:900px){
  .sidebar{width:56px;}
  .sidebar .logo h1,.sidebar .nav-section span,.sidebar nav a span,.sidebar .user-info span{display:none;}
  .sidebar .logo .badge-role{display:none;}
  .sidebar nav a{justify-content:center;padding:8px;font-size:14px;}
  .sidebar .logo{padding:10px;justify-content:center;}
  .sidebar .user-info{justify-content:center;padding:6px;}
  .main{margin-left:56px;padding:10px;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>🏥 陌拜跟踪系统</h1>
    <p class="sub">京顺医院 · 社服部</p>
    <div class="form-group"><label>账号</label><input id="loginUser" placeholder="输入账号" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="form-group"><label>密码</label><input id="loginPass" type="password" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError">账号或密码错误</div>
    <div class="role-hint">管理员 / 业务员统一入口</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="sidebar">
    <div class="logo">
      <h1>🏥 陌拜跟踪</h1>
      <span class="badge-role" id="roleBadge">后台</span>
    </div>
    <div class="nav-section"><span>📊 工作台</span></div>
    <nav id="mainNav">
      <a class="active" onclick="showPage('dashboard')" data-page="dashboard">📊 总览</a>
      <a onclick="showPage('databoard')" data-page="databoard">📉 数据看板</a>
      <a onclick="showPage('targets')" data-page="targets">🎯 目标</a>
      <a onclick="showPage('visits')" data-page="visits">📋 拜访</a>
      <a onclick="showPage('plans')" data-page="plans">📅 计划</a>
      <a onclick="showPage('performance')" data-page="performance">📈 业绩</a>
    </nav>
    <div class="nav-section" id="adminNavSection" style="display:none"><span>⚙️ 管理</span></div>
    <nav id="adminNav" style="display:none">
      <a class="admin-link" onclick="showPage('org')" data-page="org">🏢 架构</a>
      <a class="admin-link" onclick="showPage('admin')" data-page="admin">⚙️ 管理后台</a>
    </nav>
    <div class="user-info">
      <span id="userDisplay">👤</span>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </aside>
  <main class="main" id="mainContent"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">标题</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// AUTH
// ============================================================
const STORE_KEY='jingshun_mobai_v4';
const TODAY=()=>new Date().toISOString().slice(0,10);
const NOW=()=>new Date().toISOString();
const THIS_MONTH=()=>new Date().getMonth()+1;

let currentUser=null; // {id, name, role, personId}

// 岗位业绩目标档位（仅四类）
const POSITION_KEYS = ['老业务员','业务员','见习业务员','义诊公益'];
const POSITION_TIERS = {
  '老业务员':   { base: 300000, sprint: 400000, desc: '从业1年以上' },
  '业务员':     { base: 100000, sprint: 150000, desc: '试用期已过' },
  '见习业务员': { base: 50000,  sprint: 80000,  desc: '入职2个月内' },
  '义诊公益':   { base: 30000,  sprint: 50000,  desc: '义诊/社区/公益' },
};
function getPos(p){ return p.position&&POSITION_KEYS.includes(p.position)?p.position:'业务员'; }
function getBase(p){ const t=POSITION_TIERS[getPos(p)]; return t?t.base:100000; }
function getSprint(p){ const t=POSITION_TIERS[getPos(p)]; return t?t.sprint:150000; }

const STAGES=[
  {k:1,name:'信息收集',icon:'🔍',desc:'网上/渠道了解'},
  {k:2,name:'建立链接',icon:'🤝',desc:'初次接触'},
  {k:3,name:'关系递进',icon:'📈',desc:'多次拜访'},
  {k:4,name:'合作转诊',icon:'✅',desc:'达成合作'},
];

const DEFAULT={
  config:{title:'京顺医院 · 社服部',goalMin:100000,goalMax:150000,goalMonths:[7,8]},
  // System users
  users:[
    {id:'u_admin',name:'admin',role:'admin',pass:'jingshun2026',personId:null},
  ],
  groups:[
    {name:'区中医院组',color:'#2c6b9e'},
    {name:'友谊医院组',color:'#8e44ad'},
    {name:'公益义诊组',color:'#27ae60'},
    {name:'新媒体品牌企划组',color:'#e67e22'},
  ],
  personnel:[
    {id:'p1',name:'刘天宇',groups:['区中医院组'],sites:'卫生院',phone:'',note:''},
    {id:'p2',name:'李丽军',groups:['区中医院组'],sites:'义诊组',phone:'',note:''},
    {id:'p3',name:'杜学佳',groups:['友谊医院组'],sites:'体检业务',phone:'',note:''},
    {id:'p4',name:'郭素针',groups:['友谊医院组'],sites:'友谊医院',phone:'',note:''},
    {id:'p5',name:'陈志刚',groups:['公益义诊组'],sites:'120/养老院',phone:'',note:''},
    {id:'p6',name:'张响',groups:['友谊医院组'],sites:'友谊医院',phone:'',note:'特别勤务队'},
    {id:'p7',name:'杨子',groups:['—'],sites:'培训带教',phone:'',note:'培训导师'},
  ],
  targets:[],
  visits:[],
  plans:{weekly:[],monthly:[]},
  performance:{records:[]},
  activityLog:[], // {id, userId, userName, role, action, detail, timestamp}
};

// ============================================================
// DATA PERSISTENCE — JSON file via server API
// ============================================================
const API_BASE = window.location.origin;
const USE_SERVER = true; // false = fallback to localStorage

let data = null; // Will be initialized async
let dataReady = false;

async function fetchFromServer() {
  try {
    const resp = await fetch(API_BASE + '/api/data');
    if (!resp.ok) throw new Error('Server returned ' + resp.status);
    const d = await resp.json();
    if (d && d.users) {
      // Migrate: convert single group to groups array
      if (d.personnel) d.personnel.forEach(p => {
        if (p.group && !p.groups) { p.groups = [p.group]; delete p.group; }
      });
      return d;
    }
  } catch(e) {
    console.warn('Server unavailable, falling back to localStorage:', e.message);
  }
  return null;
}

async function saveToServer(data) {
  try {
    await fetch(API_BASE + '/api/data', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    return true;
  } catch(e) {
    console.warn('Failed to save to server:', e.message);
    return false;
  }
}

function saveData() {
  if (!data) return;
  // Always save to localStorage as backup
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
  // Try to save to server (fire-and-forget)
  saveToServer(data);
}

async function initData() {
  // Try server first
  const serverData = await fetchFromServer();
  if (serverData) {
    data = serverData;
    dataReady = true;
    ensureAdmin();
    return;
  }
  // Fallback to localStorage
  try {
    const r = localStorage.getItem(STORE_KEY);
    if (r) {
      data = JSON.parse(r);
      if (data.personnel) data.personnel.forEach(p => {
        if (p.group && !p.groups) { p.groups = [p.group]; delete p.group; }
      });
    }
  } catch(e) {}
  if (!data) {
    data = JSON.parse(JSON.stringify(DEFAULT));
  }
  dataReady = true;
  ensureAdmin();
  // Sync to server on next save
}

function ensureAdmin() {
  if (!data) return;
  if (!data.users) data.users = [];
  if (!data.users.find(u => u.role === 'admin')) {
    data.users.unshift({id:'u_admin',name:'管理员',role:'admin',pass:'jingshun2026',personId:null});
    saveData();
  }
  // Fix admin name
  const adminUser = data.users.find(u => u.role === 'admin');
  if (adminUser && adminUser.name !== 'admin') {
    adminUser.name = 'admin';
    saveData();
  }
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,4);}
function fmt(n){return '¥'+(Number(n)||0).toLocaleString();}
function pct(a,b){return b?((a/b)*100).toFixed(1):'0.0';}
function showGroups(p){return p.groups?p.groups.filter(g=>g!=='—').join(', '):p.group||'—';}
function getWeekStart(d){
  const dt=d?new Date(d):new Date();
  const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);
  return new Date(dt.setDate(diff)).toISOString().slice(0,10);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ============================================================
// AUDIT LOG
// ============================================================
function logAction(action,detail){
  if(!currentUser) return;
  data.activityLog.push({
    id:uid(),
    userId:currentUser.id,
    userName:currentUser.name,
    role:currentUser.role,
    action,detail,
    timestamp:NOW(),
  });
  // Keep max 1000 logs
  if(data.activityLog.length>1000) data.activityLog=data.activityLog.slice(-800);
  saveData();
}

// ============================================================
// LOGIN
// ============================================================
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  if(!data||!dataReady){
    document.getElementById('loginError').textContent='系统加载中，请稍候...';
    document.getElementById('loginError').style.display='block';
    return;
  }
  const user=data.users.find(x=>x.name===u||x.id===u);
  if(user&&user.pass===p){
    currentUser=user;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').classList.add('show');
    document.getElementById('userDisplay').textContent='👤 '+user.name;
    const badge=document.getElementById('roleBadge');
    if(user.role==='admin'){
      badge.textContent='管理';
      badge.className='badge-role badge-admin';
      document.getElementById('adminNavSection').style.display='block';
      document.getElementById('adminNav').style.display='block';
    } else {
      badge.textContent='业务';
      badge.className='badge-role badge-sales';
      document.getElementById('adminNavSection').style.display='none';
      document.getElementById('adminNav').style.display='none';
    }
    logAction('登录','登录系统');
    initApp();
  } else {
    document.getElementById('loginError').style.display='block';
  }
}

function doLogout(){
  if(currentUser) logAction('退出','退出系统');
  currentUser=null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').style.display='none';
  document.getElementById('adminNavSection').style.display='none';
  document.getElementById('adminNav').style.display='none';
}

function showPage(name){

function tSave(editId){
  const vals={name:document.getElementById('tf_name').value.trim(),type:document.getElementById('tf_type').value,stage:parseInt(document.getElementById('tf_stage').value),assignee:document.getElementById('tf_assign').value,dept:document.getElementById('tf_dept').value.trim(),note:document.getElementById('tf_note').value.trim()};

function renderWPlanList(plans){
  if(!plans.length) return `<div class="empty-state small"><div class="icon">📅</div><p>暂无周计划</p></div>`;
  return plans.map(w=>{
    const p=data.personnel.find(x=>x.id===w.personId);
    const d=w.items?.filter(i=>i.done)?.length||0;
    return `<div class="plan-item ${d===w.items?.length&&w.items?.length?'done':''}">
      <div style="display:flex;justify-content:space-between">
        <div class="plan-title">${p?p.name:'—'} · ${w.title||'周计划'}</div>
        <button class="btn btn-sm btn-outline" onclick="pEdit('weekly','${w.id}')">✏️</button>
      </div>
      <div class="plan-meta">完成 ${d}/${w.items?.length||0} ${w.area?' · '+w.area:''}</div>
      ${w.items?.map((item,i)=>`<div style="display:flex;align-items:center;gap:4px;padding:2px 0;font-size:11px">
        <input type="checkbox" ${item.done?'checked':''} onchange="pToggle('weekly','${w.id}',${i})">
        <span style="${item.done?'text-decoration:line-through;color:var(--text2)':''}">
          ${item.target||''} ${item.action||item.content||''} ${item.stage?'['+item.stage+']':''}
        </span></div>`).join('')||''}
    </div>`;
  }).join('');
}

function renderWSummaryList(plans){
  const summaries=data.plans.weekly_summary||[];
  const thisWeek=getWeekStart();
  const filtered=summaries.filter(s=>s.weekStart===thisWeek);
  if(!filtered.length) return `<div class="empty-state small"><div class="icon">📝</div><p>暂无周总结</p></div>`;
  return filtered.map(s=>{
    const p=data.personnel.find(x=>x.id===s.personId);
    return `<div class="plan-item">
      <div class="plan-title">${p?p.name:'—'} · 周总结${s.weekTotal?' 业绩¥'+s.weekTotal:''}</div>

      ${s.items?.map((item,i)=>`<div style="padding:2px 0;font-size:11px;border-bottom:1px solid #f0f0f0">
        <strong>${item.target||''}</strong> ${item.action?'→ '+item.action:''}

        ${item.amount?'<span class="tag tag-orange">¥'+item.amount+'</span>':''}

function pFormWSummary(){
  const ws=document.getElementById('ws_week')?.value||getWeekStart();
  const pid=document.getElementById('ws_p')?.value||myPersonId();
  document.getElementById('modalTitle').textContent='提交周总结（自动汇总日汇报数据）';
  // Auto-calculate from this week's visit records
  const weekVisits=data.visits.filter(v=>v.personId===pid&&v.date>=ws&&v.date<getWeekEnd(ws));
  const weekTargets=[...new Set(weekVisits.map(v=>v.targetId))];
  // Get this week's performance records
  const weekPerf=data.performance.records.filter(r=>r.personId===pid&&r.date>=ws&&r.date<getWeekEnd(ws));
  const weekTotal=weekPerf.reduce((s,r)=>s+(r.amount||0),0);
  // Build pre-filled rows from visited targets
  let items='';
  const targetsToShow=weekTargets.slice(0,6);
  while(targetsToShow.length<3) targetsToShow.push(null);
  targetsToShow.forEach((tid,i)=>{
    const t=data.targets.find(x=>x.id===tid);
    const visits=weekVisits.filter(v=>v.targetId===tid);
    const latestStage=visits.length>0?Math.max(...visits.map(v=>v.stage||1)):'';
    const visitAmt=weekPerf.filter(r=>{const vt=data.targets.find(x=>x.id===tid);return vt&&r.personId===pid;}).reduce((s,r)=>s+(r.amount||0),0);
    items+=`<div style="display:grid;grid-template-columns:2fr 2fr 1.5fr 1fr 2fr;gap:4px;margin-bottom:4px">
      <input id="wsi_${i}_target" value="${t?t.name:''}" placeholder="目标名称" style="font-size:10px;padding:3px 5px">
      <input id="wsi_${i}_action" value="${visits.length?'拜访'+visits.length+'次':''}" placeholder="完成动作" style="font-size:10px;padding:3px 5px">
      <select id="wsi_${i}_stage" style="font-size:10px;padding:3px 5px"><option value="">阶段</option><option ${latestStage===1?'selected':''}>①</option><option ${latestStage===2?'selected':''}>②</option><option ${latestStage===3?'selected':''}>③</option><option ${latestStage===4?'selected':''}>④</option></select>
      <input id="wsi_${i}_amount" type="number" value="${visitAmt||''}" placeholder="业绩(元)" style="font-size:10px;padding:3px 5px">
      <input id="wsi_${i}_next" placeholder="下周计划" style="font-size:10px;padding:3px 5px">
    </div>`;
  });
  document.getElementById('modalBody').innerHTML=`
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px;background:#e8f5e9;padding:6px 10px;border-radius:4px">
    ✅ 本周已访目标 ${weekTargets.length}个 · 拜访 ${weekVisits.length}次 · 业绩 ${fmt(weekTotal)}（自动从日汇报汇总）</div>
    <div class="form-row">
      <div class="form-group"><label>人员</label>${isAdmin()?`<select id="ws_p"><option value="">—</option>${data.personnel.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>`:`<strong style="font-size:13px;padding:4px 0;display:block">${data.personnel.find(p=>p.id===myPersonId())?.name||'—'}</strong><input type="hidden" id="ws_p" value="${myPersonId()||''}">`}</div>
      <div class="form-group"><label>周次</label><input id="ws_week" type="date" value="${ws}"></div>
    </div>
    <div class="form-group"><label>本周业绩合计（元）<span style="color:var(--text2);font-weight:normal">（系统自动汇总：${fmt(weekTotal)}）</span></label>
      <input id="ws_total" type="number" value="${weekTotal}" placeholder="0"></div>
    <div class="form-group"><label>存在问题/困难</label><textarea id="ws_problems" placeholder="记录本周遇到的困难、被拒原因、竞争情况等"></textarea></div>
    <div class="form-group"><label>各目标完成情况（自动填入本周拜访记录，可修改）</label>${items}</div>
  `;
  document.getElementById('modalFooter').innerHTML=`<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="pSaveWSummary()">保存</button>`;
  openModal();
}
function getWeekEnd(ws){
  const d=new Date(ws);d.setDate(d.getDate()+6);
  return d.toISOString().slice(0,10);
}

function pSave(type){
  const isWeekly=type==='weekly';
  const personId=document.getElementById('pf_p').value;
  const title=document.getElementById('pf_title').value.trim();
  if(!personId){alert('请选择人员');return;}
  if(isWeekly){
    const items=[];
    for(let i=0;i<6;i++){
      const target=document.getElementById(`pi_${i}_target`)?.value.trim();
      if(target){
        items.push({
          target,
          type:document.getElementById(`pi_${i}_type`)?.value||'',
          stage:document.getElementById(`pi_${i}_stage`)?.value||'',
          action:document.getElementById(`pi_${i}_action`)?.value.trim()||'',
          result:document.getElementById(`pi_${i}_result`)?.value.trim()||'',
          note:document.getElementById(`pi_${i}_note`)?.value.trim()||'',
          done:false,
        });
      }
    }
    data.plans.weekly.push({
      id:uid(),personId,title,items,
      area:document.getElementById('pf_area')?.value.trim()||'',
      weekStart:document.getElementById('pf_date').value,
    });
  } else {
    const items=[];
    for(let i=0;i<5;i++){
      const v=document.getElementById(`pi_${i}`)?.value.trim();
      if(v) items.push(v);
    }
    data.plans.monthly.push({
      id:uid(),personId,title,items,
      goal:parseFloat(document.getElementById('pf_goal')?.value)||0,
      newTargets:parseInt(document.getElementById('pf_newTargets')?.value)||0,
      visits:parseInt(document.getElementById('pf_visits')?.value)||0,
      month:parseInt(document.getElementById('pf_date').value),
    });
  }
  logAction(`添加${isWeekly?'周':'月'}计划`,title||'');
  saveData();closeModal();toast('已保存');renderPlans();
}

    ${plan.items.map(i=>`<tr><td>${i.target||''}</td><td>${i.type||''}</td><td>${i.stage||''}</td><td>${i.action||''}</td><td>${i.result||''}</td><td>${i.note||''}</td></tr>`).join('')}</table>
    <div style="margin-top:8px;font-size:12px">完成: ${plan.items.filter(i=>i.done).length}/${plan.items.length}</div>`;
  } else if(plan.items){
    detail=`<div style="font-size:12px">重点目标: ${plan.items.join('、')}</div>`;
    if(plan.goal) detail+=`<div style="font-size:12px;margin-top:4px">业绩目标: ¥${plan.goal} · 新增: ${plan.newTargets} · 拜访: ${plan.visits}</div>`;
  }
  document.getElementById('modalBody').innerHTML=`
    <div style="font-size:13px;font-weight:600;color:var(--primary);margin-bottom:8px">${p?p.name:'—'} · ${plan.title||''}</div>
    ${detail}`;
  document.getElementById('modalFooter').innerHTML=`<button class="btn btn-danger btn-sm" onclick="pDelete('${type}','${id}')">🗑删除</button><button class="btn btn-outline" onclick="closeModal()">关闭</button>`;
  openModal();
}

function pDelete(type,id){
  if(confirm('确认删除？')){data.plans[type]=data.plans[type].filter(x=>x.id!==id);saveData();closeModal();renderPlans();}
}

function pToggle(type,id,idx){
  const plan=data.plans[type].find(x=>x.id===id);
  if(plan&&plan.items[idx]){plan.items[idx].done=!plan.items[idx].done;saveData();renderPlans();}
}

function saveDailyReport(){
  const selPerson=document.getElementById('dr_person')?.value;
  const pid=selPerson||myPersonId();
  if(!pid){toast('请先选择人员');return;}
  const p=data.personnel.find(x=>x.id===pid);
  if(!p){toast('人员不存在');return;}
  const today=TODAY();
  let count=0; let newTargets=0;
  for(let i=1;i<=3;i++){
    let tgt=document.getElementById(`dr_tgt_${i}`)?.value;
    const to=document.getElementById(`dr_to_${i}`)?.value;
    const res=document.getElementById(`dr_res_${i}`)?.value.trim();
    if(!tgt||!to) continue;
    // If it's not a valid target ID, create a new target
    const existingTarget=data.targets.find(t=>t.id===tgt);
    let targetId=tgt;
    if(!existingTarget && tgt.length>1){
      // Create new target from typed name
      const nt={id:uid(),name:tgt,type:'医院/科室',stage:1,assignee:pid,dept:'',location:'',note:'日汇报手动录入',createdAt:today,updatedAt:today,visitCount:0};
      data.targets.push(nt);
      targetId=nt.id;
      newTargets++;
    } else if(!existingTarget) continue;
    // Create visit record
    data.visits.push({id:uid(),date:today,personId:pid,targetId:targetId,stage:parseInt(to.replace(/[^1-4]/g,''))||1,nextDate:'',note:res||'日汇报填写'});
    // Update target stage
    const t=data.targets.find(x=>x.id===targetId);
    if(t){const ns=parseInt(to.replace(/[^1-4]/g,''))||1;if(ns>t.stage)t.stage=ns;t.updatedAt=today;t.visitCount=(t.visitCount||0)+1;}
    count++;
  }
  // New target from dedicated field
  const newName=document.getElementById('dr_new_name')?.value.trim();
  if(newName){
    data.targets.push({id:uid(),name:newName,type:document.getElementById('dr_new_type')?.value||'医院',stage:1,assignee:pid,dept:'',location:'',note:'来源：'+(document.getElementById('dr_new_source')?.value.trim()||'日汇报'),createdAt:today,updatedAt:today,visitCount:0});
    newTargets++;
  }
  if(count>0||newTargets>0){
    logAction('日汇报提交',`${p.name} ${count}条拜访+${newTargets>0?newTargets+'个新增':''}`);
    saveData();
    toast(`✅ ${p.name}：${count}条拜访${newTargets>0?' + '+newTargets+'个新目标':''}已保存`);
    closeModal();
  }else{
    alert('请至少填一个目标（选目标或手打名称）并选择阶段变化（"到"那一列）');
  }
}

function renderPerformance(){
  const pid=myPersonId();
  let rows=[];
  if(isAdmin()){
    const pg={};
    data.personnel.filter(p=>!p.groups||!p.groups.includes('—')).forEach(p=>{pg[p.id]={name:p.name,group:showGroups(p),gained:0,target:GOAL_MIN};});
    data.performance.records.forEach(r=>{if([7,8].includes(r.month)&&pg[r.personId])pg[r.personId].gained+=r.amount||0;});
    rows=Object.values(pg).sort((a,b)=>b.gained-a.gained);
  } else if(pid){
    const p=data.personnel.find(x=>x.id===pid);
    if(p){let g=0;data.performance.records.forEach(r=>{if([7,8].includes(r.month)&&r.personId===pid)g+=r.amount||0;});rows=[{name:p.name,group:p.group,gained:g,target:GOAL_MIN}];}
  }
  const recs=myPerf().slice().sort((a,b)=>b.month-a.month);

  document.getElementById('mainContent').innerHTML=`
    <div class="page-header"><h2>📈 业绩追踪</h2><div class="actions"><button class="btn btn-sm btn-primary" onclick="perfForm()">+录入</button></div></div>
    <div class="card"><div class="card-header"><h3>🏃 增量进度</h3></div><div class="card-body"><div class="table-wrap"><table><tr><th>姓名</th><th>组别</th><th>7-8月已增</th><th>目标</th><th>进度</th><th>剩余</th></tr>
      ${rows.map(p=>{const pr=Math.min(100,(p.gained/p.target)*100);const rem=Math.max(0,p.target-p.gained);return `<tr><td><strong>${p.name}</strong></td><td><span class="tag tag-blue">${showGroups(p)}</span></td><td><strong>${fmt(p.gained)}</strong></td><td>${fmt(p.target)}</td><td><div class="progress-wrap"><div class="progress-bar"><div class="fill" style="width:${pr}%"></div></div><span class="progress-text">${pr.toFixed(0)}%</span></div></td><td style="color:${rem>0?'var(--accent)':'var(--success)'};font-weight:600">${rem>0?fmt(rem):'✅'}</td></tr>`;}).join('')}
    </table></div></div></div>
    <div class="card"><div class="card-header"><h3>📋 明细</h3></div><div class="card-body">${recs.length?`<div class="table-wrap"><table><tr><th>日期</th><th>人员</th><th>月份</th><th>金额</th><th>来源</th><th>备注</th><th>操作</th></tr>
      ${recs.map(r=>{const p=data.personnel.find(x=>x.id===r.personId);return `<tr><td>${r.date||'-'}</td><td>${p?p.name:'—'}</td><td>${r.month}月</td><td><strong>${fmt(r.amount)}</strong></td><td><span class="tag tag-orange">${r.source||'—'}</span></td><td style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.note||'—'}</td><td><button class="btn btn-sm btn-danger" onclick="perfDel('${r.id}')">🗑</button></td></tr>`;}).join('')}</table></div>`:`<div class="empty-state"><div class="icon">📈</div><p>暂无</p></div>`}
    </div></div>
  `;
}

function perfSave(){
  const personId=document.getElementById('pf_person').value;const month=parseInt(document.getElementById('pf_month').value);const amount=parseFloat(document.getElementById('pf_amount').value)||0;const source=document.getElementById('pf_source').value;const note=document.getElementById('pf_note').value.trim();const date=document.getElementById('pf_date').value;
  if(!personId||!amount){alert('请选择人员和填写金额');return;}

function renderDataBoard(){if(!isAdmin()){document.getElementById('mainContent').innerHTML='<div class="empty-state"><div class="icon">🔒</div><p>仅管理员可查看</p></div>';return;}

let adminTab='users';
function renderAdmin(){
  if(!isAdmin()){document.getElementById('mainContent').innerHTML=`<div class="empty-state"><div class="icon">🔒</div><p>仅管理员可访问</p></div>`;return;}
  document.getElementById('mainContent').innerHTML=`

    </div>

  `;
  renderAdminTab();
}
function switchAdmin(tab){adminTab=tab;renderAdminTab();}

  const content=document.getElementById('adminContent');

  if(adminTab==='users')content.innerHTML=adminUsers();
  else if(adminTab==='personnel')content.innerHTML=adminPersonnel();
  else if(adminTab==='groups')content.innerHTML=adminGroups();

  else if(adminTab==='settings')content.innerHTML=adminSettings();
}

function userForm(editId){
  const u=editId?data.users.find(x=>x.id===editId):null;
  document.getElementById('modalTitle').textContent=u?'编辑业务员账号':'添加业务员账号';
  document.getElementById('modalBody').innerHTML=`
    <div class="form-row"><div class="form-group"><label>账号名称 *</label><input id="uf_name" value="${u?u.name:''}" placeholder="如：liutianyu"></div>

    <div class="form-group"><label>关联业务员 *</label><select id="uf_person"><option value="">—</option>${data.personnel.filter(p=>!p.groups||!p.groups.includes('—')).map(p=>`<option value="${p.id}"${u&&u.personId===p.id?' selected':''}>${p.name}（${showGroups(p)}·${p.sites||''}）</option>`).join('')}</select></div>
    <div style="font-size:10px;color:var(--text2);background:#f5f5f5;padding:6px 8px;border-radius:4px">⚠️ 关联后，该账号只能查看和编辑此业务员的数据</div>
  `;
  document.getElementById('modalFooter').innerHTML=`<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="userSave('${editId||''}')">保存</button>`;
  openModal();

function userSave(editId){
  const name=document.getElementById('uf_name').value.trim();
  const pass=document.getElementById('uf_pass').value.trim();
  const personId=document.getElementById('uf_person').value;
  if(!name||!personId){alert('请填写账号名称并选择关联人员');return;}
  if(editId){
    const u=data.users.find(x=>x.id===editId);
    if(u){u.name=name;if(pass)u.pass=pass;u.personId=personId;}
    logAction('编辑账号',name);
  } else {
    if(!pass){alert('请设置密码');return;}
    if(data.users.find(x=>x.name===name)){alert('账号名已存在');return;}
    data.users.push({id:uid(),name,role:'sales',pass,personId});
    logAction('添加账号',name);
  }
  saveData();closeModal();toast('已保存');renderAdmin();
}
function userDel(id){
  if(!confirm('确认删除该账号？业务员将无法登录')) return;
  const u=data.users.find(x=>x.id===id);
  data.users=data.users.filter(x=>x.id!==id);
  logAction('删除账号',u?u.name:'');
  saveData();toast('已删除');renderAdmin();
}

  ${data.groups.map((g,i)=>`<tr><td><strong>${g.name}</strong></td><td><span style="display:inline-block;width:18px;height:18px;border-radius:3px;background:${g.color};vertical-align:middle"></span></td><td>${data.personnel.filter(p=>p.groups&&p.groups.includes(g.name)).length}人</td><td><button class="btn btn-sm btn-outline" onclick="gForm(${i})">✏️</button><button class="btn btn-sm btn-danger" onclick="gDel(${i})">🗑</button></td></tr>`).join('')}
</table></div></div></div>`;}
function gForm(idx){const g=idx!==undefined?data.groups[idx]:null;document.getElementById('modalTitle').textContent=g?'编辑分组':'添加分组';document.getElementById('modalBody').innerHTML=`<div class="form-row"><div class="form-group"><label>名称</label><input id="gf_name" value="${g?g.name:''}"></div><div class="form-group"><label>颜色</label><input id="gf_color" type="color" value="${g?g.color:'#2c6b9e'}"></div></div>`;document.getElementById('modalFooter').innerHTML=`<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="gSave(${idx!==undefined?idx:-1})">保存</button>`;openModal();}
function gSave(idx){const name=document.getElementById('gf_name').value.trim();const color=document.getElementById('gf_color').value;if(!name){alert('请填写名称');return;}if(idx>=0)data.groups[idx]={name,color};else data.groups.push({name,color});logAction(idx>=0?'编辑分组':'添加分组',name);saveData();closeModal();toast('已保存');renderAdmin();}
function gDel(idx){const g=data.groups[idx];if(!g)return;const cnt=data.personnel.filter(p=>p.group===g.name).length;if(cnt>0&&!confirm(`"${g.name}"下有${cnt}名成员，确认？`))return;data.personnel.forEach(p=>{if(p.groups&&p.groups.includes(g.name))p.groups=p.groups.filter(x=>x!==g.name);if(p.groups&&p.groups.length===0)p.groups=['—'];});data.groups.splice(idx,1);logAction('删除分组',g.name);saveData();toast('已删除');renderAdmin();}

// ----- ALL DATA -----
function adminData(){
  return `
  <div class="card"><div class="card-header"><h3>📊 全部数据总览</h3></div><div class="card-body" style="font-size:12px">
    <div class="stats-row">
      <div class="stat-card"><div class="label">👥 人员</div><div class="value">${data.personnel.length}</div></div>
      <div class="stat-card"><div class="label">🎯 目标</div><div class="value">${data.targets.length}</div></div>
      <div class="stat-card"><div class="label">📋 拜访</div><div class="value">${data.visits.length}</div></div>
      <div class="stat-card"><div class="label">📈 业绩</div><div class="value">${data.performance.records.length}</div></div>
      <div class="stat-card"><div class="label">👤 账号</div><div class="value">${data.users.length}</div></div>
      <div class="stat-card"><div class="label">📋 日志</div><div class="value">${data.activityLog.length}</div></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
      <button class="btn btn-sm btn-outline" onclick="showByPerson()">👤 按人员查看所有数据</button>
      <button class="btn btn-sm btn-danger" onclick="if(confirm('确认清空所有数据？此操作不可撤销！')){localStorage.removeItem(STORE_KEY);toast('已重置');location.reload();}">🔄 重置全部</button>
    </div>
  </div></div>`;
}
function showByPerson(){
  let html='';
  data.personnel.filter(p=>!p.groups||!p.groups.includes('—')).forEach(p=>{
    const targets=data.targets.filter(t=>t.assignee===p.id).length;
    const visits=data.visits.filter(v=>v.personId===p.id).length;
    const perf=data.performance.records.filter(r=>r.personId===p.id).reduce((s,r)=>s+(r.amount||0),0);
    const plans=data.plans.weekly.filter(w=>w.personId===p.id).length+data.plans.monthly.filter(w=>w.personId===p.id).length;
    html+=`<div class="sales-card"><div class="avatar">${p.name[0]}</div><div class="info"><div class="name">${p.name}</div><div class="meta">${showGroups(p)} · ${p.sites||''}</div></div><div style="text-align:right;font-size:10px;color:var(--text2)">🎯${targets} 📋${visits} 📅${plans} 📈${fmt(perf)}</div></div>`;
  });
  document.getElementById('modalTitle').textContent='👤 按人员数据统计';
  document.getElementById('modalBody').innerHTML=html||'<div class="empty-state small">无数据</div>';
  document.getElementById('modalFooter').innerHTML='<button class="btn btn-outline" onclick="closeModal()">关闭</button>';
  openModal();
}

// ----- LOG -----
function adminLog(){
  const logs=[...data.activityLog].sort((a,b)=>b.timestamp?.localeCompare(a.timestamp||'')||0);
  return `<div class="card"><div class="card-header"><h3>📋 操作日志</h3><span class="badge">${logs.length}条</span></div><div class="card-body"><div class="table-wrap"><table><tr><th>时间</th><th>用户</th><th>角色</th><th>操作</th><th>详情</th></tr>
    ${logs.length?logs.slice(0,100).map(l=>`<tr><td style="font-size:10px;white-space:nowrap">${l.timestamp?.slice(0,16)||'-'}</td><td>${l.userName||'—'}</td><td><span class="tag ${l.role==='admin'?'tag-red':'tag-cyan'}">${l.role||'—'}</span></td><td>${l.action||'—'}</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.detail||'—'}</td></tr>`).join(''):`<tr><td colspan="5"><div class="empty-state small">暂无日志</div></td></tr>`}
  </table></div></div></div>`;
}

// ----- SETTINGS -----
function adminSettings(){
  return `<div class="card"><div class="card-header"><h3>⚙️ 系统设置</h3></div><div class="card-body">
    <div class="form-row"><div class="form-group"><label>系统标题</label><input id="sf_title" value="${data.config.title}"></div>
    <div class="form-group"><label>管理员密码</label><input id="sf_pass" value="${data.users.find(u=>u.role==='admin')?.pass||''}"></div></div>
    <div class="form-row"><div class="form-group"><label>单人目标下限</label><input id="sf_min" type="number" value="${data.config.goalMin||GOAL_MIN}"></div>
    <div class="form-group"><label>单人目标上限</label><input id="sf_max" type="number" value="${data.config.goalMax||GOAL_MAX}"></div></div>
    <div class="form-group"><label>冲刺月份</label><input id="sf_months" value="${(data.config.goalMonths||[7,8]).join(',')}"></div>
    <button class="btn btn-primary" onclick="setSave()">保存设置</button>
  </div></div>`;
}
function setSave(){
  data.config.title=document.getElementById('sf_title').value.trim();
  const adminUser=data.users.find(u=>u.role==='admin');
  const newPass=document.getElementById('sf_pass').value.trim();
  if(newPass&&adminUser)adminUser.pass=newPass;
  data.config.goalMin=parseInt(document.getElementById('sf_min').value)||GOAL_MIN;
  data.config.goalMax=parseInt(document.getElementById('sf_max').value)||GOAL_MAX;
  data.config.goalMonths=document.getElementById('sf_months').value.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
  saveData();logAction('设置','修改系统设置');toast('已保存');renderAdmin();
}

// ============================================================
// MODAL
// ============================================================
function openModal(){document.getElementById('modalOverlay').classList.add('show');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ============================================================
// INIT
// ============================================================
// Default goal values (updated after data loads)
let GOAL_MIN = 100000;
let GOAL_MAX = 150000;

// Async initialization
(async function() {
  await initData();
  if (data && data.config) {
    GOAL_MIN = data.config.goalMin || 100000;
    GOAL_MAX = data.config.goalMax || 150000;
  }
  // Update login hint
  document.querySelector('.role-hint').textContent = '数据已就绪 · 请输入账号密码';
})();
</script>
</body>
</html>
